name: Eagle Post-Send Dropbox Sync

on:
  schedule:
    # 5:03 PM EST (22:03 UTC) weekdays — catches anything sent during the day
    - cron: '3 22 * * 1-5'
  workflow_dispatch:

jobs:
  post-send-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install PDF generation dependencies
        run: pip install pypdfium2 reportlab pypdf

      - name: Run Eagle Post-Send Dropbox Sync
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-6
          mode: agent
          allowed_tools: "mcp__Gmail__search_threads,mcp__Gmail__get_thread,mcp__Gmail__list_labels,mcp__Dropbox__download_link,mcp__Dropbox__create_file,PushNotification,Bash,Read,Write,Edit,Glob,Grep"
          direct_prompt: |
            Run the Eagle Environmental POST-SEND DROPBOX SYNC for eagle82nd@gmail.com.

            Today's date: use the current system date.

            PURPOSE: After Kevin reviews and sends an auto-quote draft, this job detects the
            sent email and saves the Proposal and Warranty PDFs to Dropbox with correct filenames.

            Dropbox naming convention (all go into /_A-Z forms/):
              Proposal:  {StreetName(CamelCase)}{Number}P{town(lowercase,nospaces)}.pdf
              Warranty:  {StreetName(CamelCase)}{Number}W{town(lowercase,nospaces)}.pdf
            Examples: MainSt105Ptownsend.pdf, MainSt105Wtownsend.pdf
                      RedBridgeLn33Psouthhadley.pdf, RedBridgeLn33Wsouthhadley.pdf

            STEP 1 — LOAD PENDING: Read pending-quotes.json from the repo. This file contains
            entries for all quotes (auto and manual) that were drafted but not yet confirmed sent.
            If the file is missing or empty, log "No pending quotes — nothing to do" and stop.

            STEP 2 — CHECK SENT MAIL: For each entry in pending-quotes.json where draft_sent is false,
            search Gmail for sent messages to that customer's email address using
            "to:<email> in:sent". If a matching sent message is found that was sent AFTER
            the date_quoted field, that draft has been sent by Kevin.

            STEP 3 — PROCESS EACH NEWLY-CONFIRMED-SENT QUOTE:

              All entry types (auto-quote, manual, add-a-fan) go through the same sent-detection flow.
              The only difference for add-a-fan: no proposal or warranty PDF was originally generated,
              so skip PDF generation and Dropbox upload — but still mark draft_sent: true and record sent_date
              so it no longer appears in open-quotes reports. Note it in the summary as sent.

              a) Download templates from Dropbox using mcp__Dropbox__download_link:
                 - "/_A-Z forms/Blank with signature.pdf"          → /tmp/blank_sig.pdf
                 - "/_A-Z forms/External Radon System Sheet.pdf"   → /tmp/external_template.pdf
                 Choose warranty template based on the entry's warranty_type field:
                   - "4year" or missing/null → "/_A-Z forms/4 Warranty.pdf" → /tmp/warranty_template.pdf
                   - "2year"                 → "/_A-Z forms/2.7 WARRANTY.pdf" → /tmp/warranty_template.pdf
                   - "none"                  → skip warranty template download; no warranty PDF will be generated
                 Download each using: curl -L -o <dest> "<download_url>"

              b) Generate the Proposal PDF:
                 python eagle-tools/make_proposal.py \
                   --name "FULL NAME" --addr "STREET ADDRESS" --town "TOWN, MA" \
                   --pipe PIPE_SIZE --fan FAN_MODEL --price PRICE --date DATE_QUOTED \
                   --template /tmp/blank_sig.pdf \
                   --out /tmp/proposal_out.pdf \
                   [--central if the entry has central: true]

              c) Generate the Warranty PDF (only if warranty_type is NOT "none"):
                 python eagle-tools/make_warranty.py \
                   --addr "STREET_ADDR, TOWN, MA" \
                   --template-warranty /tmp/warranty_template.pdf \
                   --template-external /tmp/external_template.pdf \
                   --out-warranty /tmp/warranty_out.pdf \
                   --out-external /tmp/external_out.pdf

              d) Upload to Dropbox using mcp__Dropbox__create_file:
                 - /tmp/proposal_out.pdf → /_A-Z forms/{StreetName}{Number}P{town}.pdf
                 - /tmp/warranty_out.pdf → /_A-Z forms/{StreetName}{Number}W{town}.pdf  (only if warranty generated)
                 Read each file first: base64 -w0 /tmp/proposal_out.pdf

              e) Mark draft_sent: true and record sent_date and dropbox_paths in pending-quotes.json.

            STEP 4 — SAVE AND NOTIFY: Write the updated pending-quotes.json back to the repo.
            Commit and push to branch claude/eagle-daily-quote-scan-8kp0b1.

            STEP 5 — EMAIL SUMMARY: Use Bash to send a summary email via Gmail SMTP.
            Write the email to /tmp/sync_summary_email.txt with headers then body:
              From: eagle82nd@gmail.com
              To: kmurphy654@gmail.com
              Subject: Eagle Post-Send Sync complete — <TODAY_DATE>
              (blank line)
              If files were synced: list each address synced with Proposal and Warranty filenames.
              If nothing to sync: "No pending quotes were found sent today. Nothing to sync."
            Send with:
              curl --ssl-reqd \
                --url "smtps://smtp.gmail.com:465" \
                --user "eagle82nd@gmail.com:$EAGLE_GMAIL_APP_PASSWORD" \
                --mail-from "eagle82nd@gmail.com" \
                --mail-rcpt "kmurphy654@gmail.com" \
                --upload-file /tmp/sync_summary_email.txt

            If any files were uploaded, also send a PushNotification listing which addresses
            were synced to Dropbox.

            ABSOLUTE RULES:
            - NEVER send any email to customers.
            - Only read Gmail Sent — do not modify labels or anything in Gmail here.
            - Only upload files to /_A-Z forms/ in Dropbox — do not modify other Dropbox files.
            - The only permitted outbound email is the summary to kmurphy654@gmail.com.
        env:
          GMAIL_MCP_CREDENTIALS: ${{ secrets.GMAIL_MCP_CREDENTIALS }}
          DROPBOX_MCP_CREDENTIALS: ${{ secrets.DROPBOX_MCP_CREDENTIALS }}
          EAGLE_GMAIL_APP_PASSWORD: ${{ secrets.EAGLE_GMAIL_APP_PASSWORD }}
