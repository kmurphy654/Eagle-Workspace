name: Eagle Daily Quote Scan

on:
  schedule:
    # 7:03 AM EST (12:03 UTC) weekdays — fires ~8:03 AM during EDT months
    - cron: '3 12 * * 1-5'
  workflow_dispatch:
    # Also allows manual trigger from the GitHub Actions tab

jobs:
  quote-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install PDF generation dependencies
        run: pip install pypdfium2 reportlab pypdf google-auth google-api-python-client

      - name: Fetch Google Calendar events
        env:
          GOOGLE_CALENDAR_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_CALENDAR_SERVICE_ACCOUNT_JSON }}
        run: |
          python3 - <<'PYEOF'
          import os, json, datetime
          svc_json = os.environ.get('GOOGLE_CALENDAR_SERVICE_ACCOUNT_JSON', '').strip()
          if not svc_json:
              print("CALENDAR_STATUS=skipped: no credentials")
              open('/tmp/calendar_events.json','w').write(json.dumps({"status":"skipped","events":[]}))
          else:
              try:
                  from google.oauth2 import service_account
                  from googleapiclient.discovery import build
                  creds = service_account.Credentials.from_service_account_info(
                      json.loads(svc_json),
                      scopes=['https://www.googleapis.com/auth/calendar.readonly']
                  )
                  service = build('calendar','v3',credentials=creds)
                  now = datetime.datetime.utcnow()
                  time_min = (now - datetime.timedelta(days=90)).isoformat() + 'Z'
                  time_max = (now + datetime.timedelta(days=180)).isoformat() + 'Z'
                  all_events = []
                  page_token = None
                  while True:
                      result = service.events().list(
                          calendarId='eagle82nd@gmail.com',
                          timeMin=time_min, timeMax=time_max,
                          singleEvents=True, maxResults=500,
                          pageToken=page_token
                      ).execute()
                      all_events.extend(result.get('items', []))
                      page_token = result.get('nextPageToken')
                      if not page_token:
                          break
                  out = {"status":"ok","events":[{"summary":e.get("summary",""),"description":e.get("description",""),"start":e.get("start",{}).get("dateTime",e.get("start",{}).get("date",""))} for e in all_events]}
                  open('/tmp/calendar_events.json','w').write(json.dumps(out))
                  print(f"CALENDAR_STATUS=ok: fetched {len(all_events)} events")
              except Exception as ex:
                  print(f"CALENDAR_STATUS=error: {ex}")
                  open('/tmp/calendar_events.json','w').write(json.dumps({"status":"error","error":str(ex),"events":[]}))
          PYEOF

      - name: Run Eagle Daily Quote Scan
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-6
          mode: agent
          allowed_tools: "mcp__Gmail__search_threads,mcp__Gmail__get_thread,mcp__Gmail__list_labels,mcp__Gmail__label_thread,mcp__Gmail__label_message,mcp__Gmail__unlabel_thread,mcp__Gmail__create_draft,mcp__Google_Calendar__list_events,PushNotification,Bash,Read,Write,Edit,Glob,Grep"
          direct_prompt: |
            Run the Eagle Environmental DAILY QUOTE SCAN for eagle82nd@gmail.com.

            Today's date: use the current system date.

            STEP 0 — SETUP: Copy the PDF templates from the repo into /tmp:
              cp "eagle-tools/templates/Blank with signature.pdf" /tmp/blank_sig.pdf
              cp "eagle-tools/templates/4 Warranty.pdf" /tmp/warranty_template.pdf
              cp "eagle-tools/templates/2.7 WARRANTY.pdf" /tmp/warranty_26_template.pdf
              cp "eagle-tools/templates/External Radon System Sheet.pdf" /tmp/external_template.pdf
            Use Bash to run those cp commands. These templates are needed to generate PDFs for each auto-quote.

            STEP 1 — GATHER: Search Gmail for ALL threads from webadmin@radonremover.com in the inbox.
            This scan covers every unresolved lead, not just new arrivals. Leads classified
            as BRYAN, NEEDS INFO, or ADD-A-FAN on prior runs have no skip label and WILL
            appear again — that is intentional. Kevin wants to see every open lead each day.

            STEP 2 — SKIP: Any thread already carrying Label_22, Label_23, Label_24, Label_25, or Label_26 is already processed — skip it entirely.

            STEP 2b — THREAD ACTIVITY CHECK (CRITICAL): For each remaining lead, call
            mcp__Gmail__get_thread on its thread ID to read ALL messages in the thread.
            If the thread contains more than one message (i.e., there has been any reply —
            from Kevin or the homeowner — beyond the original webadmin submission), skip
            that lead. It is already being handled personally. List it in the summary under
            "Thread has replies — skipped (handle personally)."

            STEP 2c — CALENDAR CROSS-CHECK (CRITICAL): Read /tmp/calendar_events.json using
            Bash: python3 -c "import json; d=json.load(open('/tmp/calendar_events.json')); print(d['status']); [print(e['summary'],'|',e.get('description','')) for e in d['events']]"
            If status is "ok", for each remaining lead search ALL event summaries and
            descriptions (case-insensitive) for the homeowner's PHONE NUMBER, STREET NAME
            (just the street name word, e.g. "Whipple" from "60 Whipple Hill Rd"), and
            FIRST NAME. If ANY match is found → skip that lead, it is already in the
            pipeline. List skipped leads under "Already on calendar — skipped."
            If status is not "ok", note the reason and do NOT skip anyone.

            STEP 2d — TEXT CONTACT CHECK: iMessage is not available in GitHub Actions.
            Note "iMessage check skipped — not available in this environment" in summary.

            STEP 3 — CLASSIFY each remaining thread into one of:
            - CLEAN AUTO-QUOTE: built ~2000+→RP145 or older→GX5A; single open basement; poured concrete or block (NOT stone/fieldstone/brick); NO crawlspace; NO additions; NO split/raised slab; radon ≤ ~30 pCi/L; NOT Plymouth/Cape Cod geographic area. Pipe: 3" standard, 4" if living area >3,500 sq ft. Price: $1,650 base; $2,250 if living area >3,500 sq ft; add $100 distance adder for North Shore, far Greater Boston edges, South Coast, Cape Cod, southeastern MA. Use --central flag if garage has living space above.
            - FAN SERVICE / REPAIR: existing fan that is noisy, broken, not working, running
              constantly, or needs replacement. Also: any request for service on an Eagle- or
              non-Eagle-installed fan. These are service calls, NOT new-installation quotes.
            - ADD-A-FAN QUOTE: home has an existing passive (fanless) radon pipe already
              installed, and the customer wants a fan added for the first time. No existing
              fan is present. This IS a quote.
              Exception: if the submission mentions Toll Brothers or is a Toll Brothers
              community home, classify as BRYAN instead (no proposal — handle personally).
            - NEEDS INFO: missing critical information (no street address, unclear foundation type, etc.).
            - BRYAN: stone/fieldstone/brick foundation; crawlspace; additions; split/bi-level slab; >30 pCi/L; Plymouth area; complex/multi-unit; anything requiring a site visit.
            - AGED OUT: no reply in 14+ days from submission date.

            CRITICAL — AS YOU CLASSIFY: For every lead classified as BRYAN, FAN SERVICE, or
            NEEDS INFO, immediately append one line to /tmp/bryan_leads.txt in this format:
              NAME|ADDRESS|TOWN|REASON|INQUIRY_DATE
            INQUIRY_DATE = the date the webadmin@radonremover.com email arrived (from email headers).
            Example: Shannon Boeckelman|4 Mostika Rd|Woburn|stone foundation, radon 34 pCi/L|2026-06-28
            Do this during classification, not later. This file is the source of truth for
            the email. If /tmp/bryan_leads.txt does not exist when you reach STEP 6, you
            missed leads — go back and create it now before sending the email.

            STEP 4 — ACT:
            - CLEAN AUTO-QUOTE: For each lead, generate the three PDFs using Bash.
              CRITICAL: You MUST actually run each python command below with Bash and verify
              it exits with code 0 before proceeding. If any command fails, skip this lead
              entirely — do NOT create a draft, do NOT put commands in the email body.
              Log the failure in the summary instead.

              Name output files using the street address and town so they are identifiable in Gmail.
              Derive a slug: CamelCase street name + house number + Town (TitleCase, no spaces).
              Examples: "60 Whipple Hill, Grafton" → WhippleHill60Grafton, "26 Long Hill Dr, Leominster" → LongHillDr26Leominster

              Run these Bash commands (substitute actual values):
                python eagle-tools/make_proposal.py \
                  --name "FULL NAME" --addr "STREET ADDRESS" --town "TOWN, MA" \
                  --pipe PIPE_SIZE --fan FAN_MODEL --price PRICE --date TODAY_DATE \
                  --template /tmp/blank_sig.pdf \
                  --out /tmp/{SLUG}_Proposal.pdf \
                  [--central if applicable]
                python eagle-tools/make_warranty.py \
                  --addr "STREET ADDRESS, TOWN, MA" \
                  --template-warranty /tmp/warranty_template.pdf \
                  --template-external /tmp/external_template.pdf \
                  --out-warranty /tmp/{SLUG}_Warranty.pdf \
                  --out-external /tmp/{SLUG}_ExternalSheet.pdf

              After both commands succeed, verify the output files exist:
                ls -la /tmp/{SLUG}_Proposal.pdf /tmp/{SLUG}_Warranty.pdf /tmp/{SLUG}_ExternalSheet.pdf

              If any file is missing, skip this lead — do NOT create a draft.

              Then read each output PDF with Bash to get base64:
                base64 -w0 /tmp/{SLUG}_Proposal.pdf
                base64 -w0 /tmp/{SLUG}_Warranty.pdf
                base64 -w0 /tmp/{SLUG}_ExternalSheet.pdf

              Create a Gmail draft addressed TO the customer's email (NOT a reply to webadmin).
              Subject: Radon Mitigation Proposal — STREET ADDRESS, TOWN
              Body: Hi FIRST_NAME, thank you for reaching out to Eagle Environmental. Please
              find attached our proposal for radon mitigation at STREET ADDRESS, TOWN, MA.
              We will install a sub-slab depressurization system using a RadonAway fan with
              PIPE_SIZE" PVC pipe. Proposal price: $PRICE. This includes all labor, materials,
              and our standard warranty. Please reply or call (508) 393-7633 to schedule.
              Kevin Murphy / Eagle Environmental / (508) 393-7633 / eagle82nd@gmail.com
              NOTE: Do NOT include the fan model name (RP145, GX5A, etc.) anywhere in the email body.
              Attach all three PDFs using the attachments field (use the {SLUG}-based filenames):
                - {SLUG}_Proposal.pdf (mimeType: application/pdf)
                - {SLUG}_Warranty.pdf (mimeType: application/pdf)
                - {SLUG}_ExternalSheet.pdf (mimeType: application/pdf)
              Apply Label_25 ("Auto-quote ready (review)") to the thread.
              Record each quote in pending-quotes.json (create or append) with fields:
                last_name, first_name, email, street_addr, town, fan, pipe, price, date_quoted, inquiry_date, draft_sent: false, warranty_type: "4year"
              inquiry_date = the date the webadmin email arrived (from email headers)

            - FAN SERVICE / REPAIR: List under BRYAN in the summary (Kevin handles personally).
              No draft, no PDF, no label change.
              DROPBOX LOOKUP: Before logging this lead, search Dropbox for the customer's
              street name using mcp__Dropbox__search to find any prior Eagle proposal on file.
              Look for files whose name contains the street name or house number — focus on
              files ending in P (Proposal), I (Install sheet), or S (Service record) that
              match the address. If found, use mcp__Dropbox__download_link to get a download
              URL, then: curl -L -o /tmp/prior_proposal.pdf "<url>"
              Then run: python3 -c "
              import pypdf, sys
              r = pypdf.PdfReader('/tmp/prior_proposal.pdf')
              text = ' '.join(p.extract_text() or '' for p in r.pages)
              for fan in ['RP145-2','RP145','GX5A','HP220','HP225','SGX5','EZR']:
                  if fan in text:
                      print('FAN:', fan)
                      break
              else:
                  print('FAN: not found in PDF')
              "
              Include the fan model result in the Bryan summary line for this lead so Kevin
              knows what fan is installed. If no Dropbox file is found, note "no prior file found."
            - ADD-A-FAN QUOTE: Treat like a CLEAN AUTO-QUOTE but for a fan-addition job.
              Price: $1,150 standard. Fan: RP145. Pipe: 3" (existing pipe already there).
              Generate the proposal PDF only (NO warranty or external sheet — fan addition has no warranty):
                Derive the same address+town slug as auto-quotes.
                python eagle-tools/make_proposal.py \
                  --name "FULL NAME" --addr "STREET ADDRESS" --town "TOWN, MA" \
                  --pipe 3 --fan RP145 --price 1150 --date TODAY_DATE \
                  --template /tmp/blank_sig.pdf \
                  --out /tmp/{SLUG}_Proposal.pdf
                Verify the file exists: ls -la /tmp/{SLUG}_Proposal.pdf
                Read it: base64 -w0 /tmp/{SLUG}_Proposal.pdf
              Create a Gmail draft TO the customer:
                Subject: Radon Fan Addition Proposal — STREET ADDRESS, TOWN
                Body: Hi FIRST_NAME, thank you for reaching out to Eagle Environmental.
                We can add a radon fan to your existing passive pipe system at STREET ADDRESS, TOWN, MA.
                Price: $1,150. This includes the fan unit, installation, and all labor.
                Please reply or call (508) 393-7633 to schedule.
                Kevin Murphy / Eagle Environmental / eagle82nd@gmail.com
                Attach: {SLUG}_Proposal.pdf
              Apply Label_25 to the thread.
              Record in pending-quotes.json:
                last_name, first_name, email, street_addr, town, fan: "RP145", pipe: "3",
                price: 1150, date_quoted: TODAY, draft_sent: false, warranty_type: "none", type: "add-a-fan"
            - AGED OUT: Apply Label_26 ("Aged out (review)") to the thread.
            - All others: list only in summary, no draft.

            STEP 5 — SUMMARY: Write a SUMMARY-YYYY-MM-DD.md file to the Eagle-Workspace repo (use today's actual date in the filename). Include all buckets, counts, actions taken, and any skipped leads. Every lead that was found in the inbox today MUST appear in one of these sections — even if it was seen on a prior day. Kevin wants the full picture of what is outstanding every time.

            Also include an "OPEN QUOTES BY DISTANCE" section.
            Use Bash to run: python3 eagle-tools/ma_towns.py --ring "TOWN" for each entry
            to get the distance ring. Group all entries (pending-quotes.json draft_sent=false
            plus today's Bryan/FanService/NeedsInfo leads) by distance ring:
              "0–20 miles" | "20–35 miles" | "35–50 miles" | "50+ miles" | "Unknown"
            For each entry show: customer name, address, town, price or "site visit",
            inquiry date (date the webadmin email arrived), and tag.
            If pending-quotes.json doesn't exist or has no open entries, write "No open quotes."

            Commit and push pending-quotes.json and the summary file to branch claude/eagle-daily-quote-scan-8kp0b1.

            STEP 6 — EMAIL SUMMARY: Use Bash to send a summary email via Gmail SMTP.
            Compose a plain-text email with:
              To: kmurphy654@gmail.com
              From: eagle82nd@gmail.com
              Subject: Eagle Daily Quote Scan complete — <TODAY_DATE>
              Body — keep it short and action-focused, two sections only:

              SECTION 1 — TIME-SENSITIVE (only if any exist):
                List any lead where the submission mentions a real estate closing, inspection deadline,
                moving date, or other urgency — or radon > 25 pCi/L with a stated deadline.
                Format: Name — Address — reason it's urgent
                If none, omit this section entirely.

              SECTION 2 — OPEN QUOTES BY DISTANCE FROM OFFICE:
                One unified list grouped by distance ring from Boylston, MA office.
                Use: python3 eagle-tools/ma_towns.py --ring "TOWN" to get each lead's ring.

                Rings (innermost first):
                  0–20 miles
                  20–35 miles
                  35–50 miles
                  50+ miles
                  Unknown (town not in lookup)

                Sources to combine:
                  a) pending-quotes.json entries where draft_sent is false
                  b) Every line from /tmp/bryan_leads.txt (written during STEP 3 classification)
                     Format: NAME|ADDRESS|TOWN|REASON|INQUIRY_DATE

                Each line in the email:
                  Name — Address, Town — $Price or "site visit" — [TAG] note — requested: INQUIRY_DATE

                Tags:
                  [AUTO-QUOTE]   — standard quote, draft ready
                  [FAN REQUEST]  — add-a-fan quote, draft ready
                  [BRYAN]        — site visit needed; include reason
                  [FAN SERVICE]  — repair/service call; include fan model if known
                  [NEEDS INFO]   — missing info

                EVERY line in /tmp/bryan_leads.txt must appear. Do not omit any.
                If no entries at all, write "No open leads."

              Do NOT include aged-out lists, skip counts, or iMessage notes in the email.
              Those belong in the .md summary file only.
            Send using curl with Gmail SMTP:
              curl --ssl-reqd \
                --url "smtps://smtp.gmail.com:465" \
                --user "eagle82nd@gmail.com:$EAGLE_GMAIL_APP_PASSWORD" \
                --mail-from "eagle82nd@gmail.com" \
                --mail-rcpt "kmurphy654@gmail.com" \
                --upload-file /tmp/summary_email.txt
            Write the email content (with headers) to /tmp/summary_email.txt before sending.
            The email file must start with:
              From: eagle82nd@gmail.com
              To: kmurphy654@gmail.com
              Subject: Eagle Daily Quote Scan complete — <TODAY_DATE>
              (blank line)
              (body text)

            Then send one PushNotification with a brief count of results.

            ABSOLUTE RULES:
            - NEVER send any email to customers. Only create drafts for customer emails.
            - The summary email to kmurphy654@gmail.com is the only email that may be sent.
            - The three PDF attachments (proposal, warranty, external sheet) MUST be attached to every auto-quote draft — do not skip PDF generation.
            - NEVER put PDF generation commands or instructions in a draft body. Either attach the real PDFs or skip the draft entirely.
            - NEVER create a draft without real PDF attachments. A draft with no attachments or with command text in the body is worse than no draft.
        env:
          GMAIL_MCP_CREDENTIALS: ${{ secrets.GMAIL_MCP_CREDENTIALS }}
          GOOGLE_CALENDAR_MCP_CREDENTIALS: ${{ secrets.GOOGLE_CALENDAR_MCP_CREDENTIALS }}
          DROPBOX_MCP_CREDENTIALS: ${{ secrets.DROPBOX_MCP_CREDENTIALS }}
          EAGLE_GMAIL_APP_PASSWORD: ${{ secrets.EAGLE_GMAIL_APP_PASSWORD }}
          GOOGLE_CALENDAR_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_CALENDAR_SERVICE_ACCOUNT_JSON }}
