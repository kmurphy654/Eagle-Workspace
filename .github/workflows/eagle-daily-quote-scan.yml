name: Eagle Daily Quote Scan

on:
  schedule:
    # 7:03 AM EST (12:03 UTC) weekdays — fires ~8:03 AM during EDT months
    - cron: '3 12 * * 1-5'
  workflow_dispatch:
    # Also allows manual trigger from the GitHub Actions tab

jobs:
  quote-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install PDF generation dependencies
        run: pip install pypdfium2 reportlab pypdf google-auth google-api-python-client

      - name: Run Eagle Daily Quote Scan
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-6
          mode: agent
          allowed_tools: "mcp__Gmail__search_threads,mcp__Gmail__get_thread,mcp__Gmail__list_labels,mcp__Gmail__label_thread,mcp__Gmail__label_message,mcp__Gmail__unlabel_thread,mcp__Gmail__create_draft,mcp__Google_Calendar__list_events,PushNotification,Bash,Read,Write,Edit,Glob,Grep"
          direct_prompt: |
            Run the Eagle Environmental DAILY QUOTE SCAN for eagle82nd@gmail.com.

            Today's date: use the current system date.

            STEP 0 — SETUP: Copy the PDF templates from the repo into /tmp:
              cp "eagle-tools/templates/Blank with signature.pdf" /tmp/blank_sig.pdf
              cp "eagle-tools/templates/4 Warranty.pdf" /tmp/warranty_template.pdf
              cp "eagle-tools/templates/2.7 WARRANTY.pdf" /tmp/warranty_26_template.pdf
              cp "eagle-tools/templates/External Radon System Sheet.pdf" /tmp/external_template.pdf
            Use Bash to run those cp commands. These templates are needed to generate PDFs for each auto-quote.

            STEP 1 — GATHER: Search Gmail for all threads from webadmin@radonremover.com in the inbox.

            STEP 2 — SKIP: Any thread already carrying Label_22, Label_23, Label_24, Label_25, or Label_26 is already processed — skip it entirely.

            STEP 2b — CALENDAR CROSS-CHECK (CRITICAL): For each remaining thread, query the eagle82nd@gmail.com Google Calendar using the Google Calendar REST API with the service account credentials in $GOOGLE_CALENDAR_SERVICE_ACCOUNT_JSON. Use Bash with Python to do this:
              1. Write the service account JSON to /tmp/svc_account.json from the env var
              2. Use the google-auth and googleapiclient libraries (pip install google-auth google-api-python-client) to authenticate and list events
              3. Search a wide window — 90 days back through 180 days forward
              4. For each lead, check if any calendar event contains the homeowner's PHONE NUMBER, STREET NAME, or FIRST NAME (case-insensitive substring match on event summary and description)
              5. If any match found, skip that lead entirely — it is already in the pipeline
              List skipped leads in the summary under "Already on calendar — skipped."
              If $GOOGLE_CALENDAR_SERVICE_ACCOUNT_JSON is empty or auth fails, note "Calendar check skipped — credentials not configured" and continue.

            STEP 2c — TEXT CONTACT CHECK: If iMessage/Messages MCP tools are available in this environment, search Messages for the homeowner's PHONE NUMBER. If there is an active or recent text exchange within the last 14 days (either direction), skip that lead — it is already in personal contact. List skipped leads in the summary under "Already in text contact — skipped (handle personally)" with the date of the last message. If iMessage access is not available on this machine, note "iMessage check skipped — not available in this environment" in the summary and continue.

            STEP 3 — CLASSIFY each remaining thread into one of:
            - CLEAN AUTO-QUOTE: built ~2000+→RP145 or older→GX5A; single open basement; poured concrete or block (NOT stone/fieldstone/brick); NO crawlspace; NO additions; NO split/raised slab; radon ≤ ~30 pCi/L; NOT Plymouth/Cape Cod geographic area. Pipe: 3" standard, 4" if living area >3,500 sq ft. Price: $1,650 base; $2,250 if living area >3,500 sq ft; add $100 distance adder for North Shore, far Greater Boston edges, South Coast, Cape Cod, southeastern MA. Use --central flag if garage has living space above.
            - ADD-A-FAN: existing passive radon pipe present, just needs a fan added.
            - NEEDS INFO: missing critical information (no street address, unclear foundation type, etc.).
            - BRYAN: stone/fieldstone/brick foundation; crawlspace; additions; split/bi-level slab; >30 pCi/L; Plymouth area; complex/multi-unit; anything requiring a site visit.
            - AGED OUT: no reply in 14+ days from submission date.

            STEP 4 — ACT:
            - CLEAN AUTO-QUOTE: For each lead, generate the three PDFs using Bash:
                python eagle-tools/make_proposal.py \
                  --name "FULL NAME" --addr "STREET ADDRESS" --town "TOWN, MA" \
                  --pipe PIPE_SIZE --fan FAN_MODEL --price PRICE --date TODAY_DATE \
                  --template /tmp/blank_sig.pdf \
                  --out /tmp/proposal_LASTNAME.pdf \
                  [--central if applicable]
                python eagle-tools/make_warranty.py \
                  --addr "STREET ADDRESS, TOWN, MA" \
                  --template-warranty /tmp/warranty_template.pdf \
                  --template-external /tmp/external_template.pdf \
                  --out-warranty /tmp/warranty_LASTNAME.pdf \
                  --out-external /tmp/external_LASTNAME.pdf
              Then read each output PDF with Bash (base64 -w0) to get the base64 content.
              Create a Gmail draft addressed TO the customer's email (not a reply to webadmin).
              Include fan model, pipe size, price, and any relevant notes in the body.
              Attach all three PDFs using the attachments field:
                - proposal_LASTNAME.pdf (mimeType: application/pdf)
                - warranty_LASTNAME.pdf (mimeType: application/pdf)
                - external_LASTNAME.pdf (mimeType: application/pdf)
              Apply Label_25 ("Auto-quote ready (review)") to the thread.
              Record each quote in pending-quotes.json (create or append) with fields:
                last_name, first_name, email, street_addr, town, fan, pipe, price, date_quoted, draft_sent: false

            - AGED OUT: Apply Label_26 ("Aged out (review)") to the thread.
            - All others: list only in summary, no draft.

            STEP 5 — SUMMARY: Write a SUMMARY-YYYY-MM-DD.md file to the Eagle-Workspace repo (use today's actual date in the filename). Include all buckets, counts, actions taken, and any skipped leads. Commit and push pending-quotes.json and the summary file to branch claude/eagle-daily-quote-scan-8kp0b1.

            STEP 6 — EMAIL SUMMARY: Use Bash to send a summary email via Gmail SMTP.
            Compose a plain-text email with:
              To: kmurphy654@gmail.com
              From: eagle82nd@gmail.com
              Subject: Eagle Daily Quote Scan complete — <TODAY_DATE>
              Body: A brief plain-text summary of what was done, including:
                - counts for each bucket (auto-quotes, add-a-fan, Bryan, needs info, aged out, skipped)
                - names and addresses of any auto-quote drafts created (ready to review in Gmail)
                - any aged-out leads
                - note if iMessage check was skipped
            Send using curl with Gmail SMTP:
              curl --ssl-reqd \
                --url "smtps://smtp.gmail.com:465" \
                --user "eagle82nd@gmail.com:$EAGLE_GMAIL_APP_PASSWORD" \
                --mail-from "eagle82nd@gmail.com" \
                --mail-rcpt "kmurphy654@gmail.com" \
                --upload-file /tmp/summary_email.txt
            Write the email content (with headers) to /tmp/summary_email.txt before sending.
            The email file must start with:
              From: eagle82nd@gmail.com
              To: kmurphy654@gmail.com
              Subject: Eagle Daily Quote Scan complete — <TODAY_DATE>
              (blank line)
              (body text)

            Then send one PushNotification with a brief count of results.

            ABSOLUTE RULES:
            - NEVER send any email to customers. Only create drafts for customer emails.
            - The summary email to kmurphy654@gmail.com is the only email that may be sent.
            - The three PDF attachments (proposal, warranty, external sheet) MUST be attached to every auto-quote draft — do not skip PDF generation.
        env:
          GMAIL_MCP_CREDENTIALS: ${{ secrets.GMAIL_MCP_CREDENTIALS }}
          GOOGLE_CALENDAR_MCP_CREDENTIALS: ${{ secrets.GOOGLE_CALENDAR_MCP_CREDENTIALS }}
          DROPBOX_MCP_CREDENTIALS: ${{ secrets.DROPBOX_MCP_CREDENTIALS }}
          EAGLE_GMAIL_APP_PASSWORD: ${{ secrets.EAGLE_GMAIL_APP_PASSWORD }}
          GOOGLE_CALENDAR_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_CALENDAR_SERVICE_ACCOUNT_JSON }}
