name: Eagle Manual Quote

on:
  workflow_dispatch:
    inputs:
      customer_name:
        description: 'Full name (e.g. John Smith)'
        required: true
      customer_email:
        description: 'Customer email address'
        required: true
      street_address:
        description: 'Street address (e.g. 26 Long Hill Dr)'
        required: true
      town:
        description: 'Town (e.g. Leominster)'
        required: true
      state:
        description: 'State (e.g. MA, NH, CT) — defaults to MA'
        required: false
        default: 'MA'
      year_built:
        description: 'Year built (e.g. 2003)'
        required: true
      sqft:
        description: 'Living area sq ft (e.g. 1800) — leave blank if unknown'
        required: false
        default: ''
      radon_level:
        description: 'Radon level pCi/L (e.g. 4.2) — leave blank if unknown'
        required: false
        default: ''
      central_flag:
        description: 'Garage with living space above? (yes/no)'
        required: false
        default: 'no'
      warranty_type:
        description: 'Warranty to attach: 4year, 2year, or none'
        required: false
        default: '4year'
      price_override:
        description: 'Override price (e.g. 1750) — leave blank to use standard pricing'
        required: false
        default: ''
      suction_points:
        description: 'Number of suction points (e.g. 1, 2, 4, 5) — leave blank to use standard (1)'
        required: false
        default: ''
      pipe_run:
        description: 'Pipe run description (e.g. "through the garage") — leave blank for standard'
        required: false
        default: ''
      interior:
        description: 'Interior/fan cut-in? (yes/no) — use for: (1) fan in attic/pipe through roof, or (2) fan cut into existing passive pipe. Uses interior system sheet instead of external sheet.'
        required: false
        default: 'no'
      notes:
        description: 'Any extra notes for the email body'
        required: false
        default: ''

jobs:
  manual-quote:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install PDF generation dependencies
        run: pip install pypdfium2 reportlab pypdf

      - name: Run Eagle Manual Quote
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-6
          mode: agent
          allowed_tools: "mcp__Gmail__create_draft,mcp__Dropbox__search,mcp__Dropbox__download_link,mcp__Dropbox__list_folder,PushNotification,Bash,Read,Write,Edit,Glob,Grep"
          direct_prompt: |
            Create a manual Eagle Environmental radon mitigation quote draft for the following customer.

            CUSTOMER DETAILS:
            - Name: ${{ inputs.customer_name }}
            - Email: ${{ inputs.customer_email }}
            - Address: ${{ inputs.street_address }}, ${{ inputs.town }}, ${{ inputs.state || 'MA' }}
            - Year built: ${{ inputs.year_built }}
            - Living area sq ft: ${{ inputs.sqft || 'unknown' }}
            - Radon level: ${{ inputs.radon_level || 'unknown' }} pCi/L
            - Garage with living space above: ${{ inputs.central_flag }}
            - Interior system: ${{ inputs.interior }}
            - Price override: ${{ inputs.price_override || 'none' }}
            - Notes: ${{ inputs.notes || 'none' }}

            INTERIOR SYSTEM NOTE: If interior is "yes", this is an attic-fan system (fan in attic,
            pipe through roof). Skip suction-point count entirely. The warranty to use is the
            "Cherry Palida" warranty: cp "eagle-tools/templates/Interior Warranty.pdf" /tmp/warranty_template.pdf
            (override whatever warranty_type says — interior always uses Interior Warranty).

            STEP 1 — DETERMINE FAN AND PRICE:
            - Fan model: RP145 if built 2000 or newer; GX5A if older
            - Pipe size: 3" standard; 4" if living area > 3,500 sq ft
            - Suction points: ${{ inputs.suction_points || '1' }} (use as --points arg; ignored for interior systems)
            - Pipe run: ${{ inputs.pipe_run || '' }} (if non-empty, use as --run arg; otherwise omit --run and let make_proposal.py use its default "to the exterior"; ignored for interior systems)
            - If price override is set (not "none"), use that exact number as the price. Do NOT apply any standard pricing or distance adder.
            - Otherwise: Base price: $1,650; $2,250 if living area > 3,500 sq ft; add $100 if address is in: North Shore, far Greater Boston edges, South Coast, Cape Cod, or southeastern MA

            STEP 2 — COPY TEMPLATES:
            Run these Bash commands:
              cp "eagle-tools/templates/Blank with signature.pdf" /tmp/blank_sig.pdf
            If interior is "yes":
              - Copy the interior system sheet from Dropbox: search Dropbox under "/_A-Z forms/" for a file
                whose name contains "interior" and "system" or "diagram" (case-insensitive). Download it
                using mcp__Dropbox__download_link and save to /tmp/external_template.pdf.
                If no interior sheet is found in Dropbox, fall back to:
                cp "eagle-tools/templates/External Radon System Sheet.pdf" /tmp/external_template.pdf
              - cp "eagle-tools/templates/Interior Warranty.pdf" /tmp/warranty_template.pdf
                (if this file does not exist, fall back to: cp "eagle-tools/templates/4 Warranty.pdf" /tmp/warranty_template.pdf)
            Else:
              cp "eagle-tools/templates/External Radon System Sheet.pdf" /tmp/external_template.pdf
              Warranty type: ${{ inputs.warranty_type }}
              - If "4year": cp "eagle-tools/templates/4 Warranty.pdf" /tmp/warranty_template.pdf
              - If "2year": cp "eagle-tools/templates/2.7 WARRANTY.pdf" /tmp/warranty_template.pdf
              - If "none": skip warranty copy, no warranty PDF will be generated

            STEP 3 — GENERATE PDFs:
            Name the output files using the street address and town so they are identifiable in Gmail.
            IMPORTANT: Convert the town to Title Case before using it anywhere (slug, --town arg,
            email subject, PDF filename). E.g. "leominster" → "Leominster", "south hadley" → "South Hadley".
            Derive a slug: CamelCase street name + house number + Town (TitleCase, no spaces).
            Examples: "60 Whipple Hill, Grafton" → WhippleHill60Grafton, "26 Long Hill Dr, Leominster" → LongHillDr26Leominster

            Always generate proposal:
              python eagle-tools/make_proposal.py \
                --name "CUSTOMER_NAME" \
                --addr "STREET_ADDRESS" \
                --town "TOWN_TITLECASE, STATE" \
                --pipe PIPE_SIZE \
                --fan FAN_MODEL \
                --price PRICE \
                --date TODAY_DATE \
                --points SUCTION_POINTS \
                --template /tmp/blank_sig.pdf \
                --out /tmp/{SLUG}_Proposal.pdf \
                [--central if garage flag is yes AND interior is NOT yes] \
                [--run "PIPE_RUN" only if pipe_run input is non-empty AND interior is NOT yes] \
                [--interior if interior is "yes"]

            Only generate warranty and external sheet if warranty template was copied (interior always
            generates warranty; non-interior only if warranty_type is NOT "none"):
              python eagle-tools/make_warranty.py \
                --addr "STREET_ADDRESS, TOWN_TITLECASE, STATE" \
                --template-warranty /tmp/warranty_template.pdf \
                --template-external /tmp/external_template.pdf \
                --out-warranty /tmp/{SLUG}_Warranty.pdf \
                --out-external /tmp/{SLUG}_ExternalSheet.pdf

            STEP 4 — CREATE GMAIL DRAFT:
            Read each PDF with: base64 -w0 /tmp/{SLUG}_Proposal.pdf (etc.)
            Create a Gmail draft with:
              To: CUSTOMER_EMAIL
              Subject: Radon Mitigation Proposal — STREET_ADDRESS, TOWN_TITLECASE
              Body:
                Hi FIRST_NAME,

                Thank you for reaching out to Eagle Environmental. Please find attached our proposal for radon mitigation at STREET_ADDRESS, TOWN_TITLECASE, STATE.

                We will install a sub-slab depressurization system using a RadonAway fan with PIPE_SIZE" PVC pipe. This system will draw radon from beneath your foundation and vent it safely above the roofline.

                Proposal price: $PRICE
                This price includes all labor, materials, and our standard warranty.

                Please review the attached documents. If you have any questions or would like to schedule your installation, please reply to this email or call us directly.

                We look forward to working with you.

                Kevin Murphy
                Eagle Environmental
                (508) 393-7633
                eagle82nd@gmail.com

                [Add any extra notes from the notes field if provided]

            Attachments (use the {SLUG}-based filenames):
            - Always attach {SLUG}_Proposal.pdf
            - If interior is "yes" OR warranty_type is NOT "none": also attach {SLUG}_Warranty.pdf and {SLUG}_ExternalSheet.pdf

            STEP 5 — RECORD IN PENDING QUOTES:
            Read pending-quotes.json from the repo (it may already exist with entries from the
            daily scan). If it doesn't exist, start with an empty array [].
            Append one entry for this quote:
              {
                "last_name": "LAST NAME",
                "first_name": "FIRST NAME",
                "email": "CUSTOMER EMAIL",
                "street_addr": "STREET ADDRESS",
                "town": "TOWN",
                "fan": "FAN MODEL",
                "pipe": "PIPE SIZE",
                "price": PRICE_AS_NUMBER,
                "date_quoted": "TODAY_DATE",
                "draft_sent": false,
                "warranty_type": "WARRANTY_TYPE (4year/2year/none/interior)",
                "interior": true or false,
                "source": "manual"
              }
            Write the updated array back to pending-quotes.json.
            Commit and push pending-quotes.json to branch claude/eagle-daily-quote-scan-8kp0b1.

            STEP 6 — NOTIFY:
            Send one PushNotification confirming the draft was created with the customer name and address.

            ABSOLUTE RULES:
            - NEVER send any email. Only create a draft.
            - Interior systems always get Warranty + ExternalSheet PDFs attached (3 total).
            - Non-interior systems: attach Warranty + ExternalSheet only if warranty_type is NOT "none".
        env:
          GMAIL_MCP_CREDENTIALS: ${{ secrets.GMAIL_MCP_CREDENTIALS }}
          EAGLE_GMAIL_APP_PASSWORD: ${{ secrets.EAGLE_GMAIL_APP_PASSWORD }}
