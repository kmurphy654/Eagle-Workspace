<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eagle Environmental — Quick Quote</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      padding: 20px;
    }
    .header {
      text-align: center;
      margin-bottom: 24px;
    }
    .header h1 {
      font-size: 22px;
      color: #fff;
      font-weight: 700;
    }
    .header p {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
    }
    .card {
      background: #16213e;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      border: 1px solid #0f3460;
    }
    .card h2 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #4a9eff;
      margin-bottom: 14px;
    }
    .field {
      margin-bottom: 14px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #aaa;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input, select, textarea {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #0f3460;
      background: #0f3460;
      color: #fff;
      font-size: 16px;
      -webkit-appearance: none;
    }
    input::placeholder { color: #555; }
    textarea { height: 80px; resize: vertical; font-size: 14px; }
    select option { background: #1a1a2e; }
    .row { display: flex; gap: 10px; }
    .row .field { flex: 1; }
    .btn {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: none;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    .btn:active { opacity: 0.8; }
    .btn-primary { background: #4a9eff; color: #fff; }
    .btn-secondary { background: #2d2d4e; color: #aaa; font-size: 13px; margin-top: 6px; }
    .status {
      display: none;
      text-align: center;
      padding: 16px;
      border-radius: 12px;
      margin-top: 16px;
      font-size: 15px;
      font-weight: 600;
    }
    .status.success { background: #1a3a1a; color: #4caf50; display: block; }
    .status.error { background: #3a1a1a; color: #f44336; display: block; }
    .status.loading { background: #1a2a3a; color: #4a9eff; display: block; }
    .token-section { margin-top: 6px; }
    .token-hint { font-size: 11px; color: #666; margin-top: 5px; }
  </style>
</head>
<body>

  <div class="header">
    <h1>Eagle Environmental</h1>
    <p>Quick Quote Generator</p>
  </div>

  <div class="card">
    <h2>Customer</h2>
    <div class="field">
      <label>Full Name</label>
      <input type="text" id="customer_name" placeholder="John Smith" autocomplete="name">
    </div>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="customer_email" placeholder="john@email.com" autocomplete="email">
    </div>
  </div>

  <div class="card">
    <h2>Property</h2>
    <div class="field">
      <label>Street Address</label>
      <input type="text" id="street_address" placeholder="47 Maple Street">
    </div>
    <div class="field">
      <label>Town</label>
      <input type="text" id="town" placeholder="Medford">
    </div>
    <div class="row">
      <div class="field">
        <label>Year Built</label>
        <input type="number" id="year_built" placeholder="2003" min="1800" max="2026">
      </div>
      <div class="field">
        <label>Sq Ft (optional)</label>
        <input type="number" id="sqft" placeholder="1800">
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Radon pCi/L (optional)</label>
        <input type="text" id="radon_level" placeholder="4.2">
      </div>
      <div class="field">
        <label>Garage w/ living above?</label>
        <select id="central_flag">
          <option value="no">No</option>
          <option value="yes">Yes</option>
        </select>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Notes (optional)</h2>
    <div class="field">
      <textarea id="notes" placeholder="Any extra details for the email..."></textarea>
    </div>
  </div>

  <div class="card token-section">
    <h2>GitHub Token</h2>
    <div class="field">
      <label>Personal Access Token</label>
      <input type="password" id="github_token" placeholder="ghp_..." autocomplete="off">
      <div class="token-hint">Saved locally on this device. Enter once and it stays.</div>
    </div>
  </div>

  <button class="btn btn-primary" onclick="submitQuote()">Create Draft in Gmail</button>
  <button class="btn btn-secondary" onclick="clearToken()">Clear saved token</button>

  <div id="status" class="status"></div>

  <script>
    const REPO_OWNER = 'kmurphy654';
    const REPO_NAME = 'eagle-workspace';
    const WORKFLOW_ID = 'eagle-manual-quote.yml';
    const BRANCH = 'main';

    window.onload = function() {
      const saved = localStorage.getItem('eagle_gh_token');
      if (saved) document.getElementById('github_token').value = saved;
    };

    function clearToken() {
      localStorage.removeItem('eagle_gh_token');
      document.getElementById('github_token').value = '';
      showStatus('Token cleared.', 'loading');
    }

    function showStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status ' + type;
    }

    async function submitQuote() {
      const name = document.getElementById('customer_name').value.trim();
      const email = document.getElementById('customer_email').value.trim();
      const addr = document.getElementById('street_address').value.trim();
      const town = document.getElementById('town').value.trim();
      const year = document.getElementById('year_built').value.trim();
      const token = document.getElementById('github_token').value.trim();

      if (!name || !email || !addr || !town || !year) {
        showStatus('Please fill in name, email, address, town, and year built.', 'error');
        return;
      }
      if (!token) {
        showStatus('Please enter your GitHub token.', 'error');
        return;
      }

      localStorage.setItem('eagle_gh_token', token);

      showStatus('Submitting... Draft will be in Gmail in ~2 minutes.', 'loading');

      const inputs = {
        customer_name: name,
        customer_email: email,
        street_address: addr,
        town: town,
        year_built: year,
        sqft: document.getElementById('sqft').value.trim() || '',
        radon_level: document.getElementById('radon_level').value.trim() || '',
        central_flag: document.getElementById('central_flag').value,
        notes: document.getElementById('notes').value.trim() || ''
      };

      try {
        const response = await fetch(
          `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/actions/workflows/${WORKFLOW_ID}/dispatches`,
          {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${token}`,
              'Accept': 'application/vnd.github+json',
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ ref: BRANCH, inputs })
          }
        );

        if (response.status === 204) {
          showStatus('Done! Draft will be in Gmail in about 2 minutes.', 'success');
          ['customer_name','customer_email','street_address','town','year_built','sqft','radon_level','notes'].forEach(id => {
            document.getElementById(id).value = '';
          });
          document.getElementById('central_flag').value = 'no';
        } else {
          const err = await response.json();
          showStatus('Error: ' + (err.message || response.status), 'error');
        }
      } catch (e) {
        showStatus('Network error: ' + e.message, 'error');
      }
    }
  </script>

</body>
</html>
